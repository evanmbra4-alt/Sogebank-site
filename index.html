<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sogebank UI Manager</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; }
        nav { width: 260px; background-color: var(--bg-card); padding: 24px; display: flex; flex-direction: column; gap: 8px; border-right: 1px solid #334155; }
        .logo { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 32px; text-align: center; }
        nav button { background: transparent; border: none; color: var(--text-muted); padding: 12px 16px; text-align: left; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        nav button:hover, nav button.active { background-color: #293548; color: var(--text-main); }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background-color: var(--bg-card); padding: 24px; border-radius: 12px; max-width: 600px; border: 1px solid #334155; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        input, select { background-color: var(--bg-main); border: 1px solid #334155; padding: 12px; border-radius: 6px; color: var(--text-main); }
        .btn { background-color: var(--accent); color: white; border: none; padding: 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-danger { background-color: var(--danger); }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; background-color: var(--bg-card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 16px; text-align: left; }
        th { background-color: #243146; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        tr { border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SOGEBANK</div>
        <button class="active" onclick="switchView('create')">Ouvrir un compte</button>
        <button onclick="switchView('transaction')">Dépôt / Retrait</button>
        <button onclick="switchView('list'); chargerClients();">Liste & Solde</button>
        <button onclick="switchView('delete')">Clôturer un compte</button>
    </nav>

    <main>
        <div id="create" class="view active">
            <h1 style="margin-bottom: 20px;">Ouvrir un compte</h1>
            <div class="card">
                <div class="form-group"><label>Nom</label><input type="text" id="nom"></div>
                <div class="form-group"><label>Prénom</label><input type="text" id="prenom"></div>
                <div class="form-group"><label>Date de Naissance (JJ/MM/AAAA)</label><input type="text" id="date_naiss" value="01/01/2000"></div>
                <div class="form-group"><label>Civilité</label>
                    <select id="civilite"><option value="M">M (Marié)</option><option value="C">C (Célibataire)</option><option value="D">D (Divorcé)</option><option value="V">V (Veuf)</option></select>
                </div>
                <div class="form-group"><label>Sexe</label><select id="sexe"><option value="M">Masculin</option><option value="F">Féminin</option></select></div>
                <button class="btn" onclick="creerCompte()">Créer le compte</button>
            </div>
        </div>

        <div id="transaction" class="view">
            <h1 style="margin-bottom: 20px;">Mouvements Financiers</h1>
            <div class="card">
                <div class="form-group"><label>Numéro de compte cible</label><input type="text" id="trans_num"></div>
                <div class="form-group"><label>Nature de l'opération</label><select id="trans-type"><option value="credit">Dépôt (Créditer)</option><option value="debit">Retrait (Débiter)</option></select></div>
                <div class="form-group"><label>Montant (USD)</label><input type="number" id="trans_montant" step="0.01"></div>
                <button class="btn" onclick="gererTransaction()">Valider l'opération</button>
            </div>
        </div>

        <div id="list" class="view">
            <h1 style="margin-bottom: 20px;">Consultation Générale des Comptes</h1>
            <table>
                <thead><tr><th>Numéro</th><th>Nom</th><th>Prénom</th><th>Date Naiss</th><th>Civ</th><th>Sexe</th><th>Solde actuel</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div id="delete" class="view">
            <h1 style="margin-bottom: 20px;">Clôturer définitivement un compte</h1>
            <div class="card" style="border-color: var(--danger);">
                <div class="form-group"><label>Numéro de compte à supprimer</label><input type="text" id="del_num"></div>
                <button class="btn btn-danger" onclick="supprimerCompte()">Supprimer le compte</button>
            </div>
        </div>
    </main>
    
    <script>
        const API_URL = "http://127.0.0.1:8080";

function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (event && event.currentTarget) {
        event.currentTarget.classList.add('active');
    }
}

function creerCompte() {
    const data = {
        nom: document.getElementById('nom').value.trim(), 
        prenom: document.getElementById('prenom').value.trim(),
        date_naiss: document.getElementById('date_naiss').value, 
        civilite: document.getElementById('civilite').value,
        sexe: document.getElementById('sexe').value
    };

    if(!data.nom || !data.prenom || !data.date_naiss) {
        alert("Veuillez remplir tous les champs.");
        return;
    }

    fetch(`${API_URL}/api/creer`, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify(data) 
    })
    .then(res => {
        if(!res.ok) throw new Error("Erreur serveur HTTP " + res.status);
        return res.text();
    })
    .then(txt => { 
        alert(txt); 
        chargerClients(); 
    })
    .catch(err => {
        alert("Erreur de connexion au serveur C : " + err.message);
    });
}

function gererTransaction() {
    const data = {
        numero: document.getElementById('trans_num').value.trim(),
        type: document.getElementById('trans-type').value,
        montant: parseFloat(document.getElementById('trans_montant').value)
    };
    fetch(`${API_URL}/api/transaction`, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify(data) 
    })
    .then(res => res.text())
    .then(txt => alert(txt))
    .catch(err => alert("Erreur serveur : " + err.message));
}

function supprimerCompte() {
    if(!confirm("Êtes-vous sûr de vouloir supprimer ce compte ?")) return;
    const data = { numero: document.getElementById('del_num').value.trim() };
    fetch(`${API_URL}/api/supprimer`, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify(data) 
    })
    .then(res => res.text())
    .then(txt => alert(txt))
    .catch(err => alert("Erreur serveur : " + err.message));
}

function chargerClients() {
    fetch(`${API_URL}/api/clients`)
    .then(res => res.json())
    .then(clients => {
        const tbody = document.getElementById('table-body');
        if(!tbody) return;
        tbody.innerHTML = '';
        clients.forEach(c => {
            tbody.innerHTML += `<tr>
                <td><b>${c.numero}</b></td><td>${c.nom}</td><td>${c.prenom}</td><td>${c.date}</td><td>${c.civ}</td><td>${c.sexe}</td>
                <td style="color:#10b981; font-weight:bold;">${c.solde.toFixed(2)} USD</td>
            </tr>`;
        });
    })
    .catch(err => console.log("Erreur de chargement de la liste :", err));
}

// Charger la liste automatiquement au démarrage
document.addEventListener("DOMContentLoaded", chargerClients);
    </script>
</body>
</html>
